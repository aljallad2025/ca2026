<ion-content [fullscreen]="true" class="login-content">

  <div class="hero-section">
    <div class="hero-logo">
      <ion-icon name="flash"></ion-icon>
      <span>SPEED</span>
    </div>
    <div class="hero-glow"></div>
    <img [src]="heroCarImage" class="hero-image" alt="Speed Fleet" />
  </div>

  <div class="sheet">
    <h2 class="sheet-title">{{ 'auth.signIn' | t }}</h2>
    <p class="sheet-subtitle">{{ 'auth.signInSubtitle' | t }}</p>

    <ion-segment [(ngModel)]="loginType" mode="md" class="type-segment">
      <ion-segment-button value="email">
        <ion-icon name="mail-outline"></ion-icon>
        <ion-label>{{ 'auth.email' | t }}</ion-label>
      </ion-segment-button>
      <ion-segment-button value="phone">
        <ion-icon name="phone-portrait-outline"></ion-icon>
        <ion-label>{{ 'auth.phone' | t }}</ion-label>
      </ion-segment-button>
    </ion-segment>

    <div class="input-group" *ngIf="loginType === 'email'">
      <ion-icon name="mail-outline"></ion-icon>
      <ion-input [(ngModel)]="email" type="email" [placeholder]="'auth.emailAddress' | t" dir="ltr"></ion-input>
    </div>
    <div class="input-group" *ngIf="loginType === 'phone'">
      <ion-icon name="phone-portrait-outline"></ion-icon>
      <ion-input [(ngModel)]="phone" type="tel" placeholder="+973XXXXXXXX" dir="ltr"></ion-input>
    </div>

    <div class="input-group">
      <ion-icon name="lock-closed-outline"></ion-icon>
      <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" [placeholder]="'auth.password' | t" dir="ltr"></ion-input>
      <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" (click)="showPassword = !showPassword" class="eye-icon"></ion-icon>
    </div>

    <div class="forgot-link" (click)="goToForgot()">{{ 'auth.forgotPassword' | t }}</div>

    <ion-button expand="block" (click)="login()" [disabled]="loading" class="login-btn">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">{{ 'auth.signIn' | t }}</span>
      <ion-icon *ngIf="!loading" name="arrow-forward-outline" slot="end"></ion-icon>
    </ion-button>

    <div class="divider"><span>{{ 'common.or' | t }}</span></div>

    <button class="guest-btn" (click)="continueAsGuest()">
      <ion-icon name="person-outline"></ion-icon>
      <span>{{ 'auth.continueAsGuest' | t }}</span>
    </button>

    <div class="register-link">
      {{ 'auth.noAccount' | t }} <span (click)="goToRegister()">{{ 'auth.signUp' | t }}</span>
    </div>
  </div>
</ion-content>
