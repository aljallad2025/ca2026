<ion-content [fullscreen]="true" class="list-content">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="page-header">
    <h1>Cars for Rent</h1>
    <button class="filter-btn"><ion-icon name="filter-outline"></ion-icon></button>
  </div>

  <div class="search-bar">
    <ion-icon name="search-outline"></ion-icon>
    <input type="text" [placeholder]="'cars.searchCar' | t" [(ngModel)]="searchQuery" (ionInput)="search($event)" (input)="loadCars()" />
  </div>

  <div class="results-row" *ngIf="!loading">
    <span class="count">{{ cars.length }} cars available</span>
    <div class="view-toggle">
      <button [class.active]="viewMode==='grid'" (click)="viewMode='grid'"><ion-icon name="grid-outline"></ion-icon></button>
      <button [class.active]="viewMode==='list'" (click)="viewMode='list'"><ion-icon name="list-outline"></ion-icon></button>
    </div>
  </div>

  <div class="cars-grid" [class.list-mode]="viewMode==='list'" *ngIf="!loading">
    <div class="car-card" *ngFor="let car of cars" (click)="goToCar(car)">
      <div class="car-thumb">
        <img *ngIf="hasValidImage(car)" [src]="car.image_url" [alt]="car.make + ' ' + car.model" />
        <div *ngIf="!hasValidImage(car)" class="car-fallback"><ion-icon name="car-sport-outline"></ion-icon></div>
        <button class="fav-btn" (click)="toggleFavorite(car, $event)">
          <ion-icon [name]="isFavorite(car.id) ? 'heart' : 'heart-outline'" [class.is-fav]="isFavorite(car.id)"></ion-icon>
        </button>
      </div>
      <div class="car-body">
        <h4>{{ car.make }} {{ car.model }}</h4>
        <p class="car-year">{{ car.year }} · {{ car.transmission === 'automatic' ? 'Auto' : 'Manual' }}</p>
        <div class="car-footer">
          <div class="car-price"><strong>{{ car.daily_rate }}</strong> SAR/day</div>
        </div>
      </div>
    </div>
  </div>

  <div class="cars-grid" *ngIf="loading">
    <div class="car-card skeleton" *ngFor="let i of [1,2,3,4]">
      <ion-skeleton-text animated class="car-thumb-skel"></ion-skeleton-text>
      <div class="car-body">
        <ion-skeleton-text animated style="width:80%;height:14px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width:50%;height:12px;margin-top:6px;"></ion-skeleton-text>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && !cars.length">
    <ion-icon name="car-sport-outline"></ion-icon>
    <p>No matching results</p>
  </div>

  <div style="height: 90px;"></div>
</ion-content>
